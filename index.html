<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>🎯 539家庭分析系統</title>

<script src="data.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
body{font-family:"Microsoft JhengHei";margin:0;background:#fff5f5;}
.header{background:#ff3b30;color:white;text-align:center;padding:15px;font-size:22px;}
.container{max-width:850px;margin:auto;padding:10px;}
.card{background:white;border-radius:12px;padding:12px;margin-bottom:10px;}

.ball{
display:inline-block;width:36px;height:36px;line-height:36px;
border-radius:50%;margin:4px;text-align:center;font-weight:bold;
background:#ffd54f;
}

.ball.hit{background:#42a5f5;color:white;}
.ball.hot{background:#ff5252;color:white;}

.resultCard{
background:#fffdf7;border-left:4px solid #ff9800;
padding:8px;margin-top:8px;
cursor:pointer;
}

.resultLabel{font-size:13px;color:#555;margin-top:4px;}

.btn{
padding:6px 12px;border:none;border-radius:10px;
background:#ff9800;color:white;
}

#history{max-height:320px;overflow:auto;}

.fab{position:fixed;bottom:20px;left:20px;z-index:999;}
#adminBtn{width:50px;height:50px;border-radius:50%;border:none;background:#333;color:white;font-size:20px;cursor:pointer;transition:.25s;}
.fab:hover #adminBtn{transform:scale(1.15) rotate(15deg);background:#000;}
.tooltip{position:absolute;left:60px;top:50%;transform:translateY(-50%);background:#333;color:#fff;padding:6px 10px;border-radius:8px;font-size:12px;opacity:0;transition:.2s;}
.fab:hover .tooltip{opacity:1;left:65px;}

.fab-right{position:fixed;bottom:20px;right:20px;z-index:999;}
#topBtn{width:50px;height:50px;border-radius:50%;border:none;background:#ff3b30;color:white;font-size:20px;display:none;}
.fab-right:hover #topBtn{transform:scale(1.15);}

#adminPanel{position:fixed;bottom:80px;left:20px;width:260px;display:none;z-index:999;}
</style>
</head>

<body>

<div class="header">🎯 539家庭分析系統</div>

<div class="container">

<div class="card">
<h3>最新開獎</h3>
<div id="latest"></div>
</div>

<div class="card">
<h3>🔥 今天最可能開的號碼</h3>
<div id="today"></div>
</div>

<div class="card">
<h3>📊 命中率（間隔預測）</h3>
<div id="hitRate"></div>
</div>

<div class="card">
<h3>📜 歷史開獎</h3>
<div id="rangeInfo"></div>
<button class="btn" onclick="showHistory(20)">20期</button>
<button class="btn" onclick="showHistory(9999)">全部</button>
<div id="history"></div>
</div>

</div>

<div class="fab">
<button id="adminBtn" onclick="openAdmin()">⚙</button>
<span class="tooltip">後台管理</span>
</div>

<div class="fab-right">
<button id="topBtn" onclick="scrollTopSmooth()">⬆</button>
</div>

<div id="adminPanel">
<div class="card">
<h3>🔐 登入</h3>
<input type="password" id="adminPwd" placeholder="密碼">
<button class="btn" onclick="login()">登入</button>
</div>
</div>

<script>

/* Firebase */
const firebaseConfig = {
  apiKey: "AIzaSyClKglHQojG1xfyrwVn5VONgHg3YJypOQo",
  authDomain: "project-6840445528125426070.firebaseapp.com",
  databaseURL: "https://project-6840445528125426070-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "project-6840445528125426070",
  storageBucket: "project-6840445528125426070.appspot.com",
  messagingSenderId: "917388449245",
  appId: "1:917388449245:web:f63938f3b35d2a4a9d1234"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* 資料 */
let records = [];

/* 🔥 Firebase讀取（已修復） */
db.ref("lottery").on("value", snapshot => {

let data = snapshot.val();

if(!data){
records = [];
}else{

records = Object.values(data).map(d=>{

if(!d) return null;

if(d.nums){
return { date: d.date, nums: d.nums };
}

if(Array.isArray(d)){
return { date: d[0], nums: [d[1],d[2],d[3],d[4],d[5]] };
}

return null;

}).filter(d=>d && d.nums && d.nums.length===5);

/* 排序 */
records.sort((a,b)=>{
let pa=a.date.split("/").map(Number);
let pb=b.date.split("/").map(Number);
let da = new Date(1911+pa[0], pa[1]-1, pa[2]).getTime();
let db = new Date(1911+pb[0], pb[1]-1, pb[2]).getTime();
return da - db;
});

}

/* 啟動畫面 */
showLatest();
showToday();
showHitRate();
showHistory(20);
showRange();

}); // ✅ 這行你原本少了！

/* 密碼 */
if(!localStorage.adminPwd){
localStorage.adminPwd="1234";
}

function openAdmin(){
adminPanel.style.display=adminPanel.style.display==="none"?"block":"none";
}

function login(){
if(adminPwd.value===localStorage.adminPwd){
window.location.href="admin.html";
}else{
alert("密碼錯誤");
}
}

/* === 以下全部你的原邏輯（完全沒動） === */

function getWeek(dateStr){
let p=dateStr.split("/");
let y=1911+parseInt(p[0]);
let m=parseInt(p[1])-1;
let d=parseInt(p[2]);
let w=["日","一","二","三","四","五","六"];
return "星期"+w[new Date(y,m,d).getDay()];
}

function getGapDays(date1,date2){
let p1=date1.split("/");
let p2=date2.split("/");
let d1=new Date(1911+parseInt(p1[0]),parseInt(p1[1])-1,parseInt(p1[2]));
let d2=new Date(1911+parseInt(p2[0]),parseInt(p2[1])-1,parseInt(p2[2]));
let count=0;
d1.setDate(d1.getDate()+1);
while(d1<d2){
if(d1.getDay()!==0) count++;
d1.setDate(d1.getDate()+1);
}
return count;
}

function balls(nums,cls=""){
let html="";
nums.forEach(n=>{html+=`<span class="ball ${cls}">${n}</span>`;});
return html;
}

function showLatest(){
if(!records.length) return;
let d=records[records.length-1];
latest.innerHTML=d.date+"（"+getWeek(d.date)+"）<br>"+balls(d.nums);
}

function showToday(){
let recent=records.slice(-20);
let score={};
for(let i=1;i<=39;i++) score[i]=0;
recent.forEach((d,i)=>{
d.nums.forEach(n=>{
score[n]+=1;
score[n]+=(20-i)*0.1;
});
});
let arr=Object.entries(score).map(([k,v])=>({num:Number(k),score:v}))
.sort((a,b)=>b.score-a.score).slice(0,5);
today.innerHTML=arr.map(x=>`<span class="ball hot">${x.num}</span>`).join("");
}

function showHitRate(){

if(records.length < 10){
hitRate.innerHTML="資料不足";
return;
}

let results={};

/* 建立間隔 */
for(let gap=2;gap<=10;gap++){
results[gap]={};
}

/* 計算20期 */
for(let i=records.length-1;i>=0 && i>records.length-21;i--){

let base=records[i];

for(let gap=2;gap<=10;gap++){

let targetIndex=i-gap;
if(targetIndex<0) continue;

let target=records[targetIndex];

let same=base.nums.filter(n=>target.nums.includes(n));

same.forEach(n=>{
if(!results[gap][n]) results[gap][n]=0;
results[gap][n]++;
});

}
}

/* 🔥 找最強間隔 */
let bestGap=null;
let bestScore=0;

/* 畫面 */
let html="";

for(let gap=2;gap<=10;gap++){

let strong=Object.entries(results[gap])
.filter(([n,c])=>c>=2)
.sort((a,b)=>b[1]-a[1]);

if(!strong.length) continue;

/* 計算總分 */
let total=strong.reduce((sum,x)=>sum+x[1],0);

if(total > bestScore){
bestScore = total;
bestGap = gap;
}

html+=`<div class="resultCard">`;

/* 顯示號碼+次數 */
strong.forEach(([n,count])=>{
html+=`
<div style="display:inline-block;text-align:center;margin:4px;">
<span class="ball hit">${n}</span>
<div style="font-size:11px;color:#666;">(${count})</div>
</div>
`;
});

html+=`<div class="resultLabel">間隔 ${gap} 期（重複出現）</div></div>`;
}

/* 🔥 推薦區 */
if(bestGap){

let bestNums = Object.entries(results[bestGap])
.filter(([n,c])=>c>=2)
.sort((a,b)=>b[1]-a[1])
.slice(0,5);

html = `
<div class="resultCard" style="border-left:4px solid #ff3b30;">
<div class="resultLabel">🔥 推薦間隔：${bestGap}期</div>
<div>
${bestNums.map(x=>`<span class="ball hot">${x[0]}</span>`).join("")}
</div>
</div>
` + html;

}

/* 沒資料 */
if(!html){
html="<div class='resultLabel'>20期內無穩定規律</div>";
}

hitRate.innerHTML=html;

}

function toggle(i){
let el=document.getElementById("d"+i);
el.style.display=el.style.display==="none"?"block":"none";
}

function showHistory(limit){
let list=records.slice(-limit).reverse();
let html="";
list.forEach(d=>{
html+=`<div>
<div class="resultLabel">${d.date}（${getWeek(d.date)}）</div>
${balls(d.nums)}
</div>`;
});
document.getElementById("history").innerHTML=html;
}

function showRange(){
if(!records.length) return;
let f=records[0].date.split("/");
let l=records[records.length-1].date.split("/");
rangeInfo.innerHTML=`📊 ${f[0]}年${parseInt(f[1])}月 ~ ${l[0]}年${parseInt(l[1])}月（共${records.length}筆）`;
}

window.addEventListener("scroll",()=>{
topBtn.style.display=window.scrollY>200?"block":"none";
});

function scrollTopSmooth(){
window.scrollTo({top:0,behavior:"smooth"});
}

</script>

</body>
</html>
