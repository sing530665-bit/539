<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>🎯 539智慧預測系統</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
body{font-family:"Microsoft JhengHei";margin:0;background:#fff5f5;}
.header{background:#ff3b30;color:white;text-align:center;padding:15px;font-size:22px;}
.container{max-width:850px;margin:auto;padding:10px;}
.card{background:white;border-radius:12px;padding:12px;margin-bottom:10px;}

.ball{
display:inline-block;width:42px;height:42px;line-height:42px;
border-radius:50%;margin:6px;text-align:center;font-weight:bold;
background:#ffd54f;font-size:16px;
}

.ball.hot{background:#ff5252;color:white;}

.resultLabel{font-size:14px;color:#555;margin-top:6px;}
</style>
</head>

<body>

<div class="header">🎯 539智慧預測系統</div>

<div class="container">

<div class="card">
<h3>最新開獎</h3>
<div id="latest"></div>
</div>

<div class="card">
<h3>🔥 AI預測（今日重點）</h3>
<div id="predict"></div>
</div>

</div>

<script>

/* Firebase */
const firebaseConfig = {
  apiKey: "你的KEY",
  authDomain: "xxx.firebaseapp.com",
  databaseURL: "你的DB網址",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let records = [];

/* 讀資料 */
db.ref("lottery").on("value", snap=>{

let data = snap.val();
if(!data) return;

records = Object.values(data).map(d=>{
return {date:d.date, nums:d.nums.map(n=>Number(n))};
});

/* 排序 */
records.sort((a,b)=>{
let pa=a.date.split("/").map(Number);
let pb=b.date.split("/").map(Number);
return new Date(1911+pa[0],pa[1]-1,pa[2]) -
       new Date(1911+pb[0],pb[1]-1,pb[2]);
});

showLatest();
predict();

});

/* 最新 */
function showLatest(){
let d=records[records.length-1];
latest.innerHTML = `
${d.date}<br>
${d.nums.map(n=>`<span class="ball">${n}</span>`).join("")}
`;
}

/* 🔥 AI預測 */
function predict(){

let score={};

/* 初始化 */
for(let i=1;i<=39;i++) score[i]=0;

/* ① 最近10期（權重） */
let recent = records.slice(-10);

recent.forEach((d,i)=>{
d.nums.forEach(n=>{
score[n] += 10 - i; // 越近分數越高
});
});

/* ② 連續出現加權 */
for(let i=records.length-1;i>records.length-6;i--){

let now = records[i].nums;
let prev = records[i-1]?.nums || [];

now.forEach(n=>{
if(prev.includes(n)){
score[n] += 8; // 連續加權
}
});

}

/* ③ 共現加權 */
let last = records[records.length-1].nums;

records.slice(-10).forEach(d=>{
let same = d.nums.filter(n=>last.includes(n));
if(same.length>=2){
same.forEach(n=>score[n]+=5);
}
});

/* 排序 */
let result = Object.entries(score)
.map(([n,s])=>({num:+n,score:s}))
.sort((a,b)=>b.score-a.score);

/* 取前4顆 */
let top = result.slice(0,4);

/* 顯示 */
predict.innerHTML = `
<div>
${top.map(x=>`<span class="ball hot">${x.num}</span>`).join("")}
</div>
<div class="resultLabel">
🔥 建議號碼（精選4顆）
</div>
`;

}

</script>

</body>
</html>
